# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџ”„ AUTO-UPDATE WORKFLOW вЂ” Keep Repo Always Active
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
#
# TUJUAN:
# Workflow ini menjaga repo xinnxz/xinnxz selalu "recently updated"
# sehingga repo ini muncul di urutan paling atas di daftar repositories.
#
# CARA KERJA:
# 1. Workflow berjalan setiap hari jam 00:00 UTC (07:00 WIB)
# 2. Mengupdate file lastUpdated.json dengan timestamp terbaru
# 3. Commit & push perubahan otomatis
# 4. Repo terlihat aktif в†’ muncul di urutan atas
#
# PENJELASAN CRON:
# в”Њв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ menit (0)
# в”‚ в”Њв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ jam (0 = 00:00 UTC = 07:00 WIB)
# в”‚ в”‚ в”Њв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ hari dalam bulan (* = setiap hari)
# в”‚ в”‚ в”‚ в”Њв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ bulan (* = setiap bulan)
# в”‚ в”‚ в”‚ в”‚ в”Њв”Ђв”Ђв”Ђв”Ђв”Ђ hari dalam minggu (* = setiap hari)
# в”‚ в”‚ в”‚ в”‚ в”‚
# 0 0 * * *
#
# PENTING:
# - Workflow ini TIDAK akan mengganggu branch main
# - Commit message bervariasi agar terlihat natural
# - File yang diupdate hanya lastUpdated.json (ringan)

name: рџ”„ Auto Update Profile

on:
  # в”Ђв”Ђ Jadwal Otomatis в”Ђв”Ђ
  # Setiap hari jam 00:00 UTC (07:00 WIB)
  schedule:
    - cron: '0 0 * * *'

  # в”Ђв”Ђ Manual Trigger в”Ђв”Ђ
  # Untuk testing, bisa dijalankan manual dari tab Actions
  workflow_dispatch:

# Izin untuk push perubahan
permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # в”Ђв”Ђ Step 1: Checkout Repository в”Ђв”Ђ
      # Mengambil kode dari repo agar bisa dimodifikasi
      # fetch-depth: 0 = ambil semua history (agar git log works)
      - name: рџ“Ґ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # в”Ђв”Ђ Step 2: Update lastUpdated.json в”Ђв”Ђ
      # Menggunakan Node.js inline script untuk:
      # - Generate timestamp saat ini
      # - Pilih random motivational quote
      # - Hitung total updates yang sudah dilakukan
      # - Tulis ke file lastUpdated.json
      - name: рџ”„ Update timestamp
        run: |
          node -e "
          const fs = require('fs');
          const path = 'lastUpdated.json';

          // в”Ђв”Ђ Baca file existing (jika ada) в”Ђв”Ђ
          let data = { totalUpdates: 0, history: [] };
          try {
            data = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch (e) {
            // File belum ada, pakai default
          }

          // в”Ђв”Ђ Daftar quotes motivasi в”Ђв”Ђ
          // Ini dipakai sebagai commit message agar bervariasi
          const quotes = [
            'рџљЂ Keep pushing forward',
            'рџ’» Code. Learn. Repeat.',
            'рџ”Ґ Another day, another commit',
            'вљЎ Consistency is key',
            'рџЋЇ Staying on track',
            'рџЊџ Building something great',
            'рџ“€ Growing every day',
            'рџ§  Knowledge compounds daily',
            'рџ’Є No days off',
            'рџЊ± Planting seeds for tomorrow',
            'рџ”§ Refining the craft',
            'рџЋЁ Creating with passion',
            'рџЏ—пёЏ Building the future',
            'рџ“љ Always learning',
            'вњЁ Making progress'
          ];

          // в”Ђв”Ђ Pilih quote random в”Ђв”Ђ
          const quote = quotes[Math.floor(Math.random() * quotes.length)];

          // в”Ђв”Ђ Update data в”Ђв”Ђ
          const now = new Date();
          data.lastUpdated = now.toISOString();
          data.totalUpdates = (data.totalUpdates || 0) + 1;
          data.lastQuote = quote;

          // в”Ђв”Ђ Simpan history (max 30 entries terakhir) в”Ђв”Ђ
          // Kita batasi 30 agar file tidak terlalu besar
          data.history = data.history || [];
          data.history.unshift({
            date: now.toISOString().split('T')[0],
            time: now.toTimeString().split(' ')[0],
            quote: quote,
            updateNumber: data.totalUpdates
          });
          data.history = data.history.slice(0, 30);

          // в”Ђв”Ђ Tulis ke file в”Ђв”Ђ
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          console.log('вњ… Updated lastUpdated.json');
          console.log('   Quote:', quote);
          console.log('   Total updates:', data.totalUpdates);

          // в”Ђв”Ђ Simpan quote ke file sementara в”Ђв”Ђ
          // File ini dibaca oleh shell script di bawah untuk commit message
          fs.writeFileSync('/tmp/commit_msg.txt', quote);
          "

          # в”Ђв”Ђ Commit & Push в”Ђв”Ђ
          # Menggunakan git commands untuk:
          # - Set identitas bot
          # - Add file yang berubah
          # - Commit dengan quote random sebagai message (dari /tmp/commit_msg.txt)
          # - Push ke branch main
          #
          # CATATAN PENTING:
          # - 'git diff --quiet' mengecek apakah ada perubahan
          # - Jika tidak ada perubahan (seharusnya tidak terjadi), skip commit
          # - Email menggunakan noreply GitHub agar tidak spam
          # Pakai email & username GitHub kamu agar commit
          # tercatat di contribution graph (kotak hijau)
          git config --local user.email "43901910+xinnxz@users.noreply.github.com"
          git config --local user.name "xinnxz"

          git add lastUpdated.json

          COMMIT_MSG=$(cat /tmp/commit_msg.txt)

          # Cek apakah ada perubahan yang perlu di-commit
          if git diff --cached --quiet; then
            echo "вЏ­пёЏ No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push
            echo "вњ… Changes committed and pushed!"
          fi
